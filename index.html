<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>Adhkâr — iPhone (PWA)</title>
  <style>
    :root{
      --bg:#f7f8fb; --panel:#ffffff; --card:#ffffff; --ring:#e5e7eb; --text:#111827; --muted:#6b7280; --brand:#2563eb; --brand2:#3b82f6; --warn:#b45309;
      --radius:16px; --space:16px; --tap:52px; --chip:#f2f4f8; --barbg:#eef2f7;
    }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#0b1220; --panel:#0f172a; --card:#0f172a; --ring:#1f2937; --text:#f1f5f9; --muted:#94a3b8; --chip:#141b2b; --barbg:#0b1220; --brand:#3b82f6; --brand2:#60a5fa; }
      .shadow{box-shadow:0 10px 26px rgba(0,0,0,.35)}
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial; padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);padding-bottom:env(safe-area-inset-bottom);-webkit-tap-highlight-color:transparent}

    header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--ring)}
    .container{max-width:900px;margin:0 auto;padding:var(--space)}
    .row{display:flex;gap:12px;align-items:center}
    h1{margin:0;font-size:20px;font-weight:800}
    .subtitle{font-size:13px;color:var(--muted)}
    .right{margin-left:auto}
    .btn{appearance:none;border:1px solid var(--ring);background:var(--panel);color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer;min-height:44px}
    .btn.warn{border-color:#f59e0b;background:#fef3c7;color:#92400e}

    .filters{display:flex;gap:8px;overflow:auto;padding:10px 0 4px}
    .chip{padding:10px 14px;border:1px solid var(--ring);background:var(--chip);color:var(--text);border-radius:999px;white-space:nowrap;cursor:pointer;font-weight:600}
    .chip.active{outline:2px solid var(--brand)}

    .overall{display:flex;align-items:center;gap:10px;margin-top:12px}
    .pill{padding:6px 10px;border:1px solid var(--ring);border-radius:999px;color:var(--muted)}
    .bar{flex:1;height:10px;border:1px solid var(--ring);border-radius:999px;overflow:hidden;background:var(--barbg)}
    .bar>div{height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2))}

    main{padding:var(--space)}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media (min-width:768px){ .grid{grid-template-columns:repeat(2,minmax(320px,1fr));} }

    .card{background:var(--card);border:1px solid var(--ring);border-radius:var(--radius);padding:14px}
    .title{display:flex;align-items:center;gap:10px}
    .title h3{margin:0;font-size:17px;font-weight:800}
    .trWrap{margin:6px 0 8px;padding:0;border:1px solid var(--ring);border-radius:12px;background:var(--card)}
    .trTitle{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--ring);cursor:pointer}
    .trTitle::-webkit-details-marker{display:none}
    .trTitle .action{color:var(--brand);font-weight:800}
    .translation{margin:0;padding:12px 14px;color:var(--text);font-size:clamp(15px,4.7vw,18px);line-height:1.45;letter-spacing:.1px}
    .recite{margin:8px 0;padding:12px 14px;border:1px solid var(--ring);border-radius:12px;background:var(--chip);font-weight:800;font-size:clamp(18px,5.6vw,24px);line-height:1.35;letter-spacing:.2px;text-align:center;color:var(--text)}
    .meta{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0}
    .tag{font-size:12px;padding:6px 10px;border:1px solid var(--ring);border-radius:999px;color:var(--muted)}

    .goal{display:flex;align-items:center;gap:10px;margin-top:8px}
    .progress{flex:1;height:10px;background:var(--barbg);border:1px solid var(--ring);border-radius:999px;overflow:hidden}
    .progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2))}
    .count{min-width:96px;text-align:right;font-weight:800}

    .controls{display:flex;gap:8px;margin-top:10px}
    .primary{appearance:none;border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:12px;height:var(--tap);padding:0 18px;font-size:18px;font-weight:800;flex:1}
    .ghost{appearance:none;border:1px solid var(--ring);background:transparent;color:var(--muted);border-radius:12px;min-width:44px;height:44px}

    .audioBtn{appearance:none;border:1px solid var(--ring);background:var(--chip);border-radius:999px;min-width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center}

    .subgrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:8px}
    .sub{border:1px dashed var(--ring);border-radius:12px;padding:10px}
    .sub h4{margin:0 0 6px 0;font-size:16px;font-weight:800;text-align:center}

    .foot{margin-top:8px;color:var(--muted);font-size:13px}
    .kbd{border:1px solid var(--ring);border-radius:6px;background:var(--chip);color:var(--muted);padding:2px 6px}
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="row">
        <div>
          <h1>Adhkâr</h1>
          <div class="subtitle" id="subtitle"></div>
        </div>
        <div class="right"><button id="resetGlobal" class="btn warn">Réinit. global</button></div>
      </div>
      <div class="filters" id="filters"></div>
      <div class="overall">
        <span class="pill">Progression</span>
        <div class="bar"><div id="overallBar"></div></div>
        <span id="overallPct" class="pill">0%</span>
      </div>
    </div>
  </header>

  <main>
    <section id="cards" class="grid"></section>
  </main>

<script>
var INVOCATIONS=[
  {id:'tasbih-post-salah',title:'Subḥân Allâh – Al-ḥamdu li-llâh – Allâhu akbar',transcription:'Subḥân Allâh (33) – Al-ḥamdu li-llâh (33) – Allâhu akbar (34)',translation:'Gloire à Allah – Louange à Allah – Allah est le Plus Grand',moment:['Après la prière'],wudu:'Non obligatoire mais recommandé',source:'Sahih Muslim 597a',sourceUrl:'https://sunnah.com/muslim:597a',type:'triple',parts:[{key:'subhanallah',label:'Subḥân Allâh',goal:33},{key:'alhamdulillah',label:'Al-ḥamdu li-llâh',goal:33},{key:'allahuakbar',label:'Allâhu akbar',goal:34}]},
  {id:'subhan-wa-bi-hamdih',title:'Subḥân Allâh wa bi-ḥamdih',transcription:'Subḥân Allâh wa bi-ḥamdih',translation:'Gloire à Allah et louange à Lui',moment:['Matin','Soir','Toute la journée'],wudu:'Non',source:'Sahih Muslim 2691',sourceUrl:'https://sunnah.com/muslim:2691',goal:100},
  {id:'tahlil-100',title:'Lâ ilâha illa-llâh waḥdahu lâ sharîka lah…',transcription:'Lâ ilâha illa-llâh waḥdahu lâ sharîka lah, lahu-l-mulku wa lahu-l-ḥamdu wa huwa ʿalâ kulli shay’in qadîr',translation:'Nul n’est digne d’être adoré en dehors d’Allah…',moment:['Matin','Soir'],wudu:'Non',source:'Sahih al-Bukhari 3293',sourceUrl:'https://sunnah.com/bukhari:3293',goal:100},
  {id:'istighfar',title:'Astaghfirullâh',transcription:'Astaghfirullâh',translation:'Je demande pardon à Allah',moment:['Toute la journée'],wudu:'Non',source:'Sahih Muslim 2702',sourceUrl:'https://sunnah.com/muslim:2702b',goal:100},
  {id:'salat-ala-nabi',title:'Allâhumma ṣalli ʿalâ Muḥammad…',transcription:'Allâhumma ṣalli ʿalâ Muḥammad wa ʿalâ âli Muḥammad',translation:'Ô Allah, prie sur Muhammad et sur sa famille',moment:['Toute la journée','Vendredi (recommandé)'],wudu:'Non',source:'Sahih al-Bukhari 6357',sourceUrl:'https://sunnah.com/bukhari:6357',goal:null},
  {id:'tasbih-sommeil',title:'Tasbîḥ Fâṭima (avant de dormir)',transcription:'Subḥân Allâh (33) – Al-ḥamdu li-llâh (33) – Allâhu akbar (34)',translation:'Gloire à Allah – Louange à Allah – Allah est le Plus Grand',moment:['Avant de dormir'],wudu:'Non',source:'Sahih al-Bukhari 6318',sourceUrl:'https://sunnah.com/bukhari:6318',type:'triple',parts:[{key:'subhanallah',label:'Subḥân Allâh',goal:33},{key:'alhamdulillah',label:'Al-ḥamdu li-llâh',goal:33},{key:'allahuakbar',label:'Allâhu akbar',goal:34}]}
];
var FILTERS=['Tout','Après la prière','Matin','Soir','Toute la journée','Avant de dormir'];

var AUDIO_BASE='https://archive.org/download/HisnulMuslimAudio_201510/';
var AUDIO_MAP={
  'subhan-wa-bi-hamdih':'n130.mp3',
  'tahlil-100':'n27.mp3',
  'istighfar':'n132.mp3',
  'salat-ala-nabi':'n107.mp3',
  'tasbih-post-salah':'n25.mp3',
  'tasbih-sommeil':'n111.mp3'
};
var audioEl=null,playingId=null,playingBtn=null,stopTimer=null;
function playAudio(invId,btn){
  var file=AUDIO_MAP[invId]; if(!file) return; var url=AUDIO_BASE+file;
  if(!audioEl){audioEl=new Audio();audioEl.preload='none';}
  if(playingBtn&&playingBtn!==btn){playingBtn.textContent='🔊';}
  if(playingId===invId&&!audioEl.paused){audioEl.pause();playingId=null;btn.textContent='🔊';return;}
  if(!audioEl.paused){audioEl.pause();}
  playingId=invId; playingBtn=btn; btn.textContent='⏸'; audioEl.src=url; audioEl.currentTime=0;
  if(stopTimer){clearTimeout(stopTimer);} 
  audioEl.onplay=function(){if(stopTimer){clearTimeout(stopTimer);} stopTimer=setTimeout(function(){try{audioEl.pause();}catch(e){} playingId=null; if(playingBtn){playingBtn.textContent='🔊'; playingBtn=null;}},16000)};
  audioEl.onended=function(){playingId=null; if(playingBtn){playingBtn.textContent='🔊'; playingBtn=null;}};
  audioEl.onerror=function(){playingId=null; if(playingBtn){playingBtn.textContent='🔊'; playingBtn=null;}};
  audioEl.play().catch(function(){playingId=null; if(playingBtn){playingBtn.textContent='🔊'; playingBtn=null;}});
}

var STORAGE_KEY='adhkar.v1';
function todayKey(){var d=new Date();var y=d.getFullYear();var m=String(d.getMonth()+1).padStart(2,'0');var da=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+da;}
function defaultState(){var base={date:todayKey(),counts:{}};for(var i=0;i<INVOCATIONS.length;i++){var inv=INVOCATIONS[i];if(inv.type==='triple'){base.counts[inv.id]={sub:{}};for(var j=0;j<inv.parts.length;j++){base.counts[inv.id].sub[inv.parts[j].key]=0;}}else{base.counts[inv.id]=0;}}return base;}
function loadState(){try{var raw=localStorage.getItem(STORAGE_KEY),fresh=defaultState();if(!raw) return fresh;var p=JSON.parse(raw);if(p.date!==todayKey()) return fresh;var st={date:todayKey(),counts:{}};for(var i=0;i<INVOCATIONS.length;i++){var inv=INVOCATIONS[i];if(inv.type==='triple'){var base={sub:{}};for(var j=0;j<inv.parts.length;j++){base.sub[inv.parts[j].key]=0;}var s=(p.counts&&p.counts[inv.id])||{};st.counts[inv.id]={sub:Object.assign({},base.sub,s.sub||{})};}else{var v=(p.counts&&p.counts[inv.id])||0;st.counts[inv.id]=Math.max(0,Number(v));}}return st;}catch(e){return defaultState();}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
var state=loadState();

function $(s){return document.querySelector(s);} function $$(s){return Array.prototype.slice.call(document.querySelectorAll(s));}
function setSubtitle(){var tz=(Intl.DateTimeFormat().resolvedOptions().timeZone)||'local';var fmt=new Intl.DateTimeFormat('fr-FR',{dateStyle:'full'});$('#subtitle').textContent=fmt.format(new Date())+' • '+tz;}
function activeFilter(){var b=$$('.chip').find(function(c){return c.classList.contains('active');});return b?b.dataset.filter:'Tout';}
function inFilter(inv){var f=activeFilter();if(f==='Tout') return true;return inv.moment&&inv.moment.indexOf(f)>-1;}
function renderFilters(){var box=$('#filters');box.innerHTML='';for(var i=0;i<FILTERS.length;i++){(function(f,i){var b=document.createElement('button');b.className='chip'+(i===0?' active':'');b.textContent=f;b.dataset.filter=f;b.onclick=function(){$$('.chip').forEach(function(c){c.classList.remove('active');});b.classList.add('active');renderCards();updateOverall();};box.appendChild(b);})(FILTERS[i],i);}}
function pct(n){return Math.max(0,Math.min(100,Math.round(n)));}
function cardProgress(inv){if(inv.type==='triple'){var e=state.counts[inv.id];var goal=inv.parts.reduce(function(a,p){return a+p.goal;},0);var cur=Object.keys(e.sub).reduce(function(a,k){return a+(e.sub[k]||0);},0);return {current:cur,goal:goal,pct:(cur/goal)*100};}if(typeof inv.goal==='number'&&inv.goal>0){var c=state.counts[inv.id]||0;return {current:c,goal:inv.goal,pct:(c/inv.goal)*100};}var v=state.counts[inv.id]||0;return {current:v,goal:null,pct:0};}
function updateOverall(){var withGoals=INVOCATIONS.filter(function(v){return v.type==='triple'||(typeof v.goal==='number'&&v.goal>0);});var done=0,total=0;for(var i=0;i<withGoals.length;i++){var pr=cardProgress(withGoals[i]);done+=Math.min(pr.current,pr.goal);total+=pr.goal;}var p=total?(done/total)*100:0;$('#overallBar').style.width=pct(p)+'%';$('#overallPct').textContent=pct(p)+'%';}

function renderCards(){var wrap=$('#cards');wrap.innerHTML='';INVOCATIONS.filter(inFilter).forEach(function(inv){var card=document.createElement('article');card.className='card shadow';
  var head=document.createElement('div');head.className='title';var h3=document.createElement('h3');h3.textContent=inv.title;head.appendChild(h3);var abtn=document.createElement('button');abtn.className='audioBtn';abtn.textContent='🔊';abtn.title='Écouter un exemple court';abtn.onclick=function(){playAudio(inv.id,abtn)};head.appendChild(abtn);card.appendChild(head);
  var rec=document.createElement('div');rec.className='recite';rec.textContent=inv.transcription;card.appendChild(rec);
  var trWrap=document.createElement('details');trWrap.className='trWrap';var trTitle=document.createElement('summary');trTitle.className='trTitle';var tLabel=document.createElement('span');tLabel.textContent='Traduction (FR)';var tAction=document.createElement('span');tAction.className='action';tAction.textContent='Afficher';trTitle.appendChild(tLabel);trTitle.appendChild(tAction);trWrap.appendChild(trTitle);var tr=document.createElement('div');tr.className='translation';tr.textContent=inv.translation;trWrap.appendChild(tr);trWrap.open=false;trWrap.addEventListener('toggle',function(){tAction.textContent=trWrap.open?'Masquer':'Afficher';});card.appendChild(trWrap);
  var meta=document.createElement('div');meta.className='meta';(inv.moment||[]).forEach(function(m){var t=document.createElement('span');t.className='tag';t.textContent=m;meta.appendChild(t);});var w=document.createElement('span');w.className='tag';w.textContent='Ablutions: '+inv.wudu;meta.appendChild(w);var s;if(inv.sourceUrl){s=document.createElement('a');s.className='tag';s.href=inv.sourceUrl;s.target='_blank';s.rel='noopener';s.textContent='Source: '+inv.source;}else{s=document.createElement('span');s.className='tag';s.textContent='Source: '+inv.source;}meta.appendChild(s);card.appendChild(meta);
  if(inv.type==='triple'){
    var subgrid=document.createElement('div');subgrid.className='subgrid';inv.parts.forEach(function(p){var sub=document.createElement('div');sub.className='sub';var h4=document.createElement('h4');h4.textContent=p.label+' • '+p.goal;sub.appendChild(h4);var g=document.createElement('div');g.className='goal';var prog=document.createElement('div');prog.className='progress';var fill=document.createElement('div');prog.appendChild(fill);var cnt=document.createElement('div');cnt.className='count';g.appendChild(prog);g.appendChild(cnt);sub.appendChild(g);var controls=document.createElement('div');controls.className='controls';var plus=document.createElement('button');plus.className='primary';plus.textContent='+1';var reset=document.createElement('button');reset.className='ghost';reset.textContent='↺';controls.appendChild(plus);controls.appendChild(reset);sub.appendChild(controls);subgrid.appendChild(sub);function sync(){var v=(state.counts[inv.id].sub[p.key]||0);var pc=Math.min(100,(v/p.goal)*100);fill.style.width=pct(pc)+'%';cnt.textContent=v+' / '+p.goal;}function clamp(v){return Math.max(0,Math.min(p.goal,v));}plus.onclick=function(){state.counts[inv.id].sub[p.key]=clamp((state.counts[inv.id].sub[p.key]||0)+1);saveState();sync();syncTotal();};reset.onclick=function(){state.counts[inv.id].sub[p.key]=0;saveState();sync();syncTotal();};sync();});
    var total=document.createElement('div');total.className='goal';var tp=document.createElement('div');tp.className='progress';var tf=document.createElement('div');tp.appendChild(tf);var tc=document.createElement('div');tc.className='count';total.appendChild(tp);total.appendChild(tc);function syncTotal(){var pr=cardProgress(inv);tf.style.width=pct(pr.pct)+'%';tc.textContent=pr.current+' / '+pr.goal;updateOverall();}card.appendChild(subgrid);card.appendChild(total);setTimeout(syncTotal,0);
  } else {
    var g=document.createElement('div');g.className='goal';var prog=document.createElement('div');prog.className='progress';var fill=document.createElement('div');prog.appendChild(fill);var cnt=document.createElement('div');cnt.className='count';g.appendChild(prog);g.appendChild(cnt);card.appendChild(g);var controls=document.createElement('div');controls.className='controls';var plus=document.createElement('button');plus.className='primary';plus.textContent='+1';var reset=document.createElement('button');reset.className='ghost';reset.textContent='↺';controls.appendChild(plus);controls.appendChild(reset);card.appendChild(controls);function sync(){var v=(state.counts[inv.id]||0);if(typeof inv.goal==='number'&&inv.goal>0){var pc=Math.min(100,(v/inv.goal)*100);fill.style.width=pct(pc)+'%';cnt.textContent=v+' / '+inv.goal;}else{fill.style.width='0%';cnt.textContent=String(v);} }function clamp(v){if(typeof inv.goal==='number'&&inv.goal>0){return Math.max(0,Math.min(inv.goal,v));}return Math.max(0,v);}plus.onclick=function(){state.counts[inv.id]=clamp((state.counts[inv.id]||0)+1);saveState();sync();updateOverall();};reset.onclick=function(){state.counts[inv.id]=0;saveState();sync();updateOverall();};sync();
  }
  wrap.appendChild(card);
});}

function performResetGlobal(){try{localStorage.removeItem(STORAGE_KEY);}catch(e){} state=defaultState();saveState();renderFilters();$$('.chip').forEach(function(c,i){c.classList.toggle('active',i===0);});renderCards();updateOverall();}

document.getElementById('resetGlobal').onclick=function(){if(!confirm("Purger TOUTES les données et remettre l'application à zéro ?")) return;performResetGlobal();};

async function setupPWA(){
  function icon(size){var c=document.createElement('canvas');c.width=size;c.height=size;var x=c.getContext('2d');var g=x.createLinearGradient(0,0,size,size);g.addColorStop(0,'#1d4ed8');g.addColorStop(1,'#0ea5e9');x.fillStyle=g;x.fillRect(0,0,size,size);x.fillStyle='rgba(255,255,255,.1)';x.fillRect(0,0,size,size);x.fillStyle='#fff';x.beginPath();x.arc(size*0.42,size*0.42,size*0.22,0,Math.PI*2);x.fill();x.globalCompositeOperation='destination-out';x.beginPath();x.arc(size*0.5,size*0.36,size*0.22,0,Math.PI*2);x.fill();x.globalCompositeOperation='source-over';return c.toDataURL('image/png');}
  var a=document.createElement('link');a.rel='apple-touch-icon';a.sizes='180x180';a.href=icon(180);document.head.appendChild(a);
  var m={name:'Adhkâr — Compteur',short_name:'Adhkâr',start_url:'./',display:'standalone',background_color:'#ffffff',theme_color:'#ffffff',icons:[{src:icon(192),sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:icon(512),sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
  var mb=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});var ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(mb);document.head.appendChild(ml);
  if('serviceWorker' in navigator && window.isSecureContext){
    try{
      var swUrl='./sw.js';
      var res=await fetch(swUrl,{method:'GET',cache:'no-store'});
      if(res.ok){ await navigator.serviceWorker.register(swUrl); }
    }catch(e){}
  }
}

function msUntilNextMidnight(){var n=new Date();var t=new Date(n);t.setHours(24,0,0,0);return Math.max(0,t-n);} var __midnightTimer=null;function scheduleAutoReset(){if(__midnightTimer) clearTimeout(__midnightTimer);var d=msUntilNextMidnight()+1000;__midnightTimer=setTimeout(function(){if(state.date!==todayKey()){state=defaultState();saveState();renderCards();updateOverall();setSubtitle();}scheduleAutoReset();},d);} 

function runSelfTests(){
  function a(n,c){if(!c) throw new Error('Test: '+n);}
  a('todayKey format',/^\d{4}-\d{2}-\d{2}$/.test(todayKey()));
  var st=defaultState(); a('state has all counts',Object.keys(st.counts).length===INVOCATIONS.length);
  a('pct clamps 120->100',pct(120)===100); a('pct clamps -5->0',pct(-5)===0); a('pct rounds',pct(49.6)===50);
}

setSubtitle(); renderFilters(); renderCards(); updateOverall(); setupPWA(); scheduleAutoReset();
if(location.search.indexOf('test=1')>-1){ try{ runSelfTests(); console.log('Self-tests: OK'); }catch(e){ console.error(e); } }
</script>
</body>
</html>
